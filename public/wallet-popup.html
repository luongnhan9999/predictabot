<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sphere Wallet Connection</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-purple: #a855f7;
            --accent-cyan: #00e5ff;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            padding: 1.5rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: linear-gradient(180deg, rgba(168, 85, 247, 0.1) 0%, transparent 100%);
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }

        .header h2 {
            font-size: 1.25rem;
            margin-bottom: 0.25rem;
        }

        .header p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .content {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dapp-info {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: var(--surface-color);
            padding: 1rem;
            border-radius: 12px;
            width: 100%;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .dapp-logo {
            width: 40px;
            height: 40px;
            border-radius: 8px;
        }

        .dapp-details {
            flex: 1;
        }
        
        .dapp-details strong {
            display: block;
            font-size: 0.95rem;
        }
        
        .dapp-details span {
            font-size: 0.75rem;
            color: var(--accent-cyan);
        }

        .permissions {
            width: 100%;
            margin-bottom: 2rem;
        }

        .permissions h4 {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .perm-list {
            list-style: none;
        }

        .perm-list li {
            font-size: 0.85rem;
            padding: 0.5rem 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .perm-list li::before {
            content: "✓";
            color: var(--accent-cyan);
            font-weight: bold;
        }

        .actions {
            width: 100%;
            display: flex;
            gap: 1rem;
            margin-top: auto;
        }

        .btn {
            flex: 1;
            padding: 0.8rem;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-cancel {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        .btn-connect {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            color: #fff;
        }

        .btn-connect:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(168, 85, 247, 0.3);
        }

        .btn-connect:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .loader {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">👛</div>
        <h2>Sphere Wallet</h2>
        <p>Connection Request</p>
    </div>

    <div class="content">
        <div class="dapp-info">
            <img src="favicon.jpg" alt="PredictaBot" class="dapp-logo" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'40\' height=\'40\'><rect width=\'40\' height=\'40\' fill=\'%23a855f7\'/></svg>'">
            <div class="dapp-details">
                <strong>PredictaBot Arena</strong>
                <span>https://predictabot.vercel.app</span>
            </div>
        </div>

        <div class="permissions">
            <h4>Requested Permissions</h4>
            <ul class="perm-list">
                <li>View your wallet address</li>
                <li>Request transaction signatures</li>
                <li>Read token balances (UCT)</li>
            </ul>
        </div>

        <div class="actions">
            <button class="btn btn-cancel" id="btn-cancel">Cancel</button>
            <button class="btn btn-connect" id="btn-connect">
                <span id="connect-text">Connect</span>
                <span class="loader hidden" id="connect-loader"></span>
            </button>
        </div>
    </div>

    <script>
        const API_KEY = "sk_99df313bab4f43d19dcc376c0bc09ab6"; // User provided API Key for simulation

        function generateMockAddress() {
            const chars = '0123456789abcdef';
            let addr = 'b3';
            for(let i = 0; i < 62; i++) {
                addr += chars[Math.floor(Math.random() * 16)];
            }
            return addr;
        }

        document.getElementById('btn-cancel').addEventListener('click', () => {
            window.close();
        });

        document.getElementById('btn-connect').addEventListener('click', (e) => {
            const btn = e.currentTarget;
            btn.disabled = true;
            document.getElementById('connect-text').textContent = 'Connecting...';
            document.getElementById('connect-loader').classList.remove('hidden');

            // Simulate SDK handshake & auth delay
            setTimeout(() => {
                const mockAddress = generateMockAddress();
                const mockBalance = (Math.random() * 5000 + 1000).toFixed(2);
                
                // Send success message back to parent window
                if (window.opener) {
                    window.opener.postMessage({
                        type: 'SPHERE_WALLET_CONNECTED',
                        address: mockAddress,
                        balance: mockBalance
                    }, '*');
                }
                
                window.close();
            }, 1800);
        });
    </script>
</body>
</html>
